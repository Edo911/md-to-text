    <style>
        :root {

        [data-theme="dark"] {

        .preview-body pre code { background: transparent; color: inherit; padding: 0; font-size: 0.85rem; }
        button.main-btn { padding: 8px 16px; border-radius: 8px; border: none; background: var(--primary); color: white; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
        button.main-btn:hover { background: var(--primary-hover); }
        .btn-danger { background: #ef4444 !important; }

        .status-bar { padding: 6px 24px; font-size: 0.75rem; color: var(--text-secondary); display: flex; gap: 16px; align-items: center; justify-content: flex-end; border-top: 1px solid var(--border); background: var(--panel-bg); position: relative; z-index: 10; }
        .save-indicator { margin-right: auto; font-weight: bold; display: flex; align-items: center; gap: 6px; }
        .save-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block; }

<body>
<input type="file" id="universal-file-picker" style="display: none;" accept=".md,.txt" onchange="handleUniversalFile(this)">
<header>
    <a href="" class="brand-link" title="Reload Editor">
        <svg class="brand-logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
            <defs>
                <linearGradient id='grad-header' x1='0%' y1='100%' x2='100%' y2='0%'>
                    <stop offset='0%' stop-color='#4f46e5'/>
                    <stop offset='100%' stop-color='#818cf8'/>
                </linearGradient>
            </defs>
            <circle cx="16" cy="16" r="14" fill="url(#grad-header)"/>
            <path d="M9 14L6 16L9 18M23 14L26 16L23 18" stroke="white" stroke-width="2" stroke-linecap='round' stroke-linejoin='round' fill='none' opacity='0.6'/>
            <path d="M16 7C17.5 10 18 12 18 15C18 18 17.5 20 16 22C14.5 20 14 18 14 15C14 12 14.5 10 16 7Z" fill="white"/>
        </svg>
        <span class="logo-text">MDtoTEXT</span>
    </a>
    <div class="actions-group">
        <button onclick="triggerUniversalOpen()" class="main-btn btn-secondary">📂 Open File</button>
        <button onclick="copyCleanHTML()" class="main-btn btn-secondary" style="color: var(--primary) !important;">📋 Copy HTML</button>
        <button onclick="triggerUniversalSave()" class="main-btn btn-secondary">💾 Save As</button>
        <div class="divider" style="height:34px;"></div>
        <button onclick="window.print()" class="main-btn btn-secondary">🖨️ Print</button>
        <button onclick="toggleTheme()" class="main-btn btn-secondary" id="theme-btn">🌙 Dark Mode</button>
        <button onclick="exportWordSecure()" class="main-btn">Export Word</button>
        <button onclick="clearEditor()" class="main-btn btn-danger">🗑️ Clear</button>
    </div>
</header>
<div class="container">
    <div class="panel" id="editor-panel">
        <div class="panel-header">
            <span>
                <div class="toolbar">
                    <button class="toolbar-btn" onclick="undo()" title="Undo (Ctrl+Z)">↩️</button>
                    <button class="toolbar-btn" onclick="redo()" title="Redo (Ctrl+Y)">↪️</button>
                    <div class="divider"></div>
                    <button class="toolbar-btn" onclick="insertText('**', '**')">B</button>
                    <button class="toolbar-btn" onclick="insertText('*', '*')">I</button>
                    <button class="toolbar-btn" onclick="insertText('`', '`')">Code</button>
                    <button class="toolbar-btn" onclick="insertText('# ', '')">H1</button>
                    <button class="toolbar-btn" onclick="insertText('[', '](url)')">🔗 Link</button>
                    <button class="toolbar-btn" onclick="insertText('- [ ] ', '')">☑️ Todo</button>
                    <button class="toolbar-btn" onclick="insertText('- ', '')">⚫ List</button>
                    <button class="toolbar-btn" onclick="insertText('| Header 1 | Header 2 |\\n| :--- | :--- |\\n| Cell 1 | Cell 2 |\\n', '')">📊 Table</button>
                </div>
            </span>
            <button class="header-btn" onclick="toggleFocus('editor')">[ ↔ ] Fullscreen</button>
        </div>
        <div class="find-replace-bar">
            <button class="find-click-btn" onclick="executeFind('left')">🔍 Find</button>
            <input type="text" id="find-txt" placeholder="Search text..." oninput="handleSearchHighlight('left')">
            <button class="find-click-btn secondary-find" onclick="executeReplace('left')">🔄 Replace</button>
            <input type="text" id="replace-txt" placeholder="With...">
            <button class="find-click-btn secondary-find" onclick="executeReplaceAll('left')">🔁 Replace All</button>
        </div>
        <div class="editor-wrapper">
            <div id="backdrop" class="editor-backdrop"></div>
            <textarea id="editor" placeholder="Start typing..." spellcheck="false"></textarea>
        </div>
    </div>
   
    <div class="panel" id="preview-panel">
        <div class="panel-header">
            <span>
                <div class="toolbar">
                    <button class="toolbar-btn" onclick="undo()">↩️</button>
                    <button class="toolbar-btn" onclick="redo()">↪️</button>
                    <div class="divider"></div>
                    <button class="toolbar-btn" onclick="insertTextAtPreview('**', '**')">B</button>
                    <button class="toolbar-btn" onclick="insertTextAtPreview('*', '*')">I</button>
                    <button class="toolbar-btn" onclick="insertTextAtPreview('`', '`')">Code</button>
                </div>
            </span>
            <button class="header-btn" onclick="toggleFocus('preview')">[ ↔ ] Fullscreen</button>
        </div>
        <div class="find-replace-bar">
            <button class="find-click-btn" onclick="executeFind('right')">🔍 Find</button>
            <input type="text" id="find-txt-right" placeholder="Search text..." oninput="handleSearchHighlight('right')">
            <button class="find-click-btn secondary-find" onclick="executeReplace('right')">🔄 Replace</button>
            <input type="text" id="replace-txt-right" placeholder="With...">
            <button class="find-click-btn secondary-find" onclick="executeReplaceAll('right')">🔁 Replace All</button>
        </div>
        <div id="preview" class="preview-body" contenteditable="true" spellcheck="false"></div>
    </div>
</div>
<div class="status-bar">
    <div class="save-indicator"><span id="save-dot" class="save-dot"></span><span id="save-status">● Saved</span></div>
    <span id="stat-words">Words: 0</span><span id="stat-chars">Chars: 0</span>
</div>

<script>
    const editor = document.getElementById('editor');
    const backdrop = document.getElementById('backdrop');
    const preview = document.getElementById('preview');
    const ePanel = document.getElementById('editor-panel');
    const pPanel = document.getElementById('preview-panel');
   
    const findLeft = document.getElementById('find-txt');
    const replaceLeft = document.getElementById('replace-txt');
    const findRight = document.getElementById('find-txt-right');
    const replaceRight = document.getElementById('replace-txt-right');

    mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });
    const turndownService = new TurndownService({ headingStyle: 'atx', codeBlockStyle: 'fenced', emDelimiter: '*', bulletListMarker: '-' });

    let historyStack = [];
    let historyIndex = -1;
    const maxHistorySize = 30;

    // === Default template ===
    const enterpriseSeoTemplate = `# Welcome to MDtoTEXT

This is a **premium** Markdown editor with live preview.

## Features
- Real-time WYSIWYG preview
- Find & Replace in both panels
- Undo / Redo
- Export to Word / HTML / Markdown
- Dark mode
- Auto-save to localStorage

> Start typing below...

`;

    // Drag & Drop
    window.addEventListener('dragover', (e) => e.preventDefault(), false);
    window.addEventListener('drop', (e) => e.preventDefault(), false);

    [ePanel, pPanel].forEach(panel => {
        panel.addEventListener('dragover', (e) => { e.preventDefault(); e.stopPropagation(); });
        panel.addEventListener('drop', (e) => {
            e.preventDefault(); e.stopPropagation();
            const file = e.dataTransfer.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => { 
                    editor.value = event.target.result; 
                    saveHistoryState(); 
                    render(); 
                };
                reader.readAsText(file);
            }
        });
    });

    function triggerUniversalOpen() { 
        document.getElementById('universal-file-picker').click(); 
    }

    function handleUniversalFile(input) {
        const file = input.files[0]; 
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => { 
            editor.value = e.target.result; 
            saveHistoryState(); 
            render(); 
        };
        reader.readAsText(file); 
        input.value = '';
    }

    function triggerUniversalSave() {
        const blob = new Blob([editor.value], { type: 'text/markdown;charset=utf-8' });
        const link = document.createElement('a'); 
        link.href = URL.createObjectURL(blob);
        link.download = 'document.md'; 
        link.click();
    }

    function copyCleanHTML() { 
        navigator.clipboard.writeText(preview.innerHTML).then(() => { 
            alert('HTML Copied!'); 
        }); 
    }

    function exportWordSecure() {
        const htmlContent = `<html><body>${preview.innerHTML}</body></html>`;
        const blob = new Blob(['\ufeff' + htmlContent], { type: 'application/msword' });
        const a = document.createElement('a'); 
        a.href = URL.createObjectURL(blob); 
        a.download = 'document.doc'; 
        a.click();
    }

    function saveHistoryState() {
        if (historyIndex < historyStack.length - 1) { 
            historyStack = historyStack.slice(0, historyIndex + 1); 
        }
        historyStack.push(editor.value);
        if (historyStack.length > maxHistorySize) historyStack.shift();
        historyIndex = historyStack.length - 1;
    }
   
    function undo() { 
        if (historyIndex > 0) { 
            historyIndex--; 
            editor.value = historyStack[historyIndex]; 
            render(true); 
        } 
    }
    function redo() { 
        if (historyIndex < historyStack.length - 1) { 
            historyIndex++; 
            editor.value = historyStack[historyIndex]; 
            render(true); 
        } 
    }

    let inputTimeout;
    editor.addEventListener('input', () => {
        render(true);
        clearTimeout(inputTimeout);
        inputTimeout = setTimeout(() => { saveHistoryState(); }, 300);
    });

    preview.addEventListener('input', () => {
        let convertedMarkdown = turndownService.turndown(preview.innerHTML);
        editor.value = convertedMarkdown;
        updateMetrics(convertedMarkdown);
        applyBackdropHighlights(convertedMarkdown);
        try { localStorage.setItem('doc', convertedMarkdown); } catch(e){}
    });

    editor.addEventListener('scroll', () => {
        backdrop.scrollTop = editor.scrollTop; 
        backdrop.scrollLeft = editor.scrollLeft;
        const ratio = editor.scrollTop / (editor.scrollHeight - editor.clientHeight || 1);
        preview.scrollTop = ratio * (preview.scrollHeight - preview.clientHeight || 1);
    });

    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); undo(); }
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') { e.preventDefault(); redo(); }
    });

    function insertText(before, after) {
        const start = editor.selectionStart, end = editor.selectionEnd, text = editor.value;
        editor.value = text.substring(0, start) + before + text.substring(start, end) + after + text.substring(end);
        editor.focus();
        editor.selectionStart = editor.selectionEnd = start + before.length;
        saveHistoryState();
        render();
    }
   
    function insertTextAtPreview(before, after) {
        insertText(before, after);
    }

    function updateMetrics(text) {
        const chars = text.length;
        const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
        document.getElementById('stat-words').innerText = `Words: ${words}`;
        document.getElementById('stat-chars').innerText = `Chars: ${chars}`;
    }

    function applyBackdropHighlights(text) {
        let escapedText = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        const searchStr = findLeft.value;
       
        if (searchStr && searchStr.trim() !== '') {
            try {
                const regex = new RegExp('(' + escapeRegExp(searchStr) + ')', 'gi');
                escapedText = escapedText.replace(regex, '<mark>$1</mark>');
            } catch(e){}
        }
        backdrop.innerHTML = escapedText + '\n';
    }

    function escapeRegExp(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function toggleFocus(mode) { 
        if (mode === 'editor') pPanel.classList.toggle('hidden'); 
        if (mode === 'preview') ePanel.classList.toggle('hidden'); 
    }

    function toggleTheme() { 
        document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); 
    }

    async function render(skipHistory = false) {
        const val = editor.value;
        preview.innerHTML = marked.parse(val);
        updateMetrics(val);
        applyBackdropHighlights(val);
       
        preview.querySelectorAll('pre code').forEach((el) => { 
            hljs.highlightElement(el); 
        });

        if (findRight.value && findRight.value.trim() !== '') {
            highlightPreviewTextSecure(findRight.value);
        }
       
        if (!skipHistory) {
            try { localStorage.setItem('doc', val); } catch(e){}
        }
    }

    function clearEditor() {
        if(confirm('Clear all content?')) {
            editor.value = '';
            try { localStorage.removeItem('doc'); } catch(e){}
            saveHistoryState();
            render();
        }
    }

    function handleSearchHighlight(side) {
        if (side === 'left') {
            applyBackdropHighlights(editor.value);
        } else {
            render(true);
        }
    }

    function highlightPreviewTextSecure(searchStr) {
        if (!searchStr || searchStr.trim() === '') return;
       
        const r_text = escapeRegExp(searchStr);
        const regex = new RegExp(r_text, 'gi');
       
        const textNodes = [];
        const walk = document.createTreeWalker(preview, NodeFilter.SHOW_TEXT, null, false);
        let node;
        while (node = walk.nextNode()) {
            if (node.parentNode.tagName !== 'MARK' && node.parentNode.tagName !== 'SCRIPT' && node.parentNode.tagName !== 'STYLE') {
                textNodes.push(node);
            }
        }
       
        textNodes.forEach(node => {
            const matches = node.nodeValue.match(regex);
            if (matches) {
                const parent = node.parentNode;
                const fragments = document.createDocumentFragment();
                let lastIndex = 0;
               
                node.nodeValue.replace(regex, (match, index) => {
                    if (index > lastIndex) {
                        fragments.appendChild(document.createTextNode(node.nodeValue.substring(lastIndex, index)));
                    }
                    const mark = document.createElement('mark');
                    mark.textContent = match;
                    fragments.appendChild(mark);
                   
                    lastIndex = index + match.length;
                    return match;
                });
               
                if (lastIndex < node.nodeValue.length) {
                    fragments.appendChild(document.createTextNode(node.nodeValue.substring(lastIndex)));
                }
                parent.replaceChild(fragments, node);
            }
        });
    }

    function executeFind(side) {
        const searchInput = side === 'left' ? findLeft : findRight;
        const searchStr = searchInput.value;
        if (!searchStr) return;
        window.find(searchStr, false, false, true, false, true, false);
    }

    function executeReplace(side) {
        const searchStr = side === 'left' ? findLeft.value : findRight.value;
        const replaceStr = side === 'left' ? replaceLeft.value : replaceRight.value;
        if (!searchStr) return;
        let text = editor.value;
        const regex = new RegExp(escapeRegExp(searchStr), 'i');
        if (regex.test(text)) {
            editor.value = text.replace(regex, replaceStr);
            saveHistoryState();
            render();
            executeFind(side);
        }
    }

    function executeReplaceAll(side) {
        const searchStr = side === 'left' ? findLeft.value : findRight.value;
        const replaceStr = side === 'left' ? replaceLeft.value : replaceRight.value;
        if (!searchStr) return;
        let text = editor.value;
        const regex = new RegExp(escapeRegExp(searchStr), 'gi');
        if (regex.test(text)) {
            editor.value = text.replace(regex, replaceStr);
            saveHistoryState();
            render();
        }
    }

    // Load saved document or default template
    let savedDoc = "";
    try { savedDoc = localStorage.getItem('doc'); } catch(e){}
   
    if (!savedDoc || savedDoc.trim().length < 10) {
        editor.value = enterpriseSeoTemplate;
    } else {
        editor.value = savedDoc;
    }

    historyStack.push(editor.value);
    historyIndex = 0;
    render(false);
</script>
